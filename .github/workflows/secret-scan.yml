name: Secret scan

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  # A force-push can remove a secret-bearing PR head from later history. Only
  # coalesce duplicate attempts for the exact same checked-out SHA; every
  # distinct PR head and direct-main push keeps its own security scan.
  group: secret-scan-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # A PR scan must include a removed transient secret anywhere between
          # its base and head, not only the final working tree.
          fetch-depth: 0
      - name: Restore gitleaks binary
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/gitleaks
          key: gitleaks-linux-x64-8.30.1
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          mkdir -p "$HOME/.local/bin"
          if [ ! -x "$HOME/.local/bin/gitleaks" ]; then
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
            tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
            install /tmp/gitleaks "$HOME/.local/bin/gitleaks"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Scan commit range
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            log_opts="--diff-merges=first-parent ${PULL_REQUEST_BASE_SHA}..${PULL_REQUEST_HEAD_SHA}"
          elif [[ "$PUSH_BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            log_opts="--diff-merges=first-parent $PUSH_AFTER_SHA"
          else
            log_opts="--diff-merges=first-parent ${PUSH_BEFORE_SHA}..${PUSH_AFTER_SHA}"
          fi
          gitleaks git --log-opts="$log_opts" --config .gitleaks.toml --redact --verbose

  public-ready-gate:
    # Content/identity exposure gate — the security-scan sibling of gitleaks
    # (which covers credentials). Unlike gitleaks (per-diff), this gate scans
    # tracked content plus every reachable commit's author/committer identity
    # and message, so a PR that introduces a private string or a foreign
    # identity fails here.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the --metadata scan reads every reachable commit's
          # author/committer identity and message, not just the tip tree.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Public-ready grep gate (tracked content + commit metadata)
        run: python3 scripts/vidux-public-ready-grep-gate.py --tracked-only --metadata
