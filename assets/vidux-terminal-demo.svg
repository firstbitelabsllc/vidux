<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 424" fill="none" role="img" aria-label="A real vidux CLI session: vidux init scaffolds PLAN.md, vidux status lists the plan, vidux browse starts the local cockpit">
  <style>
    .term-bg { fill: #1e1e2e; }
    .term-titlebar { fill: #181825; }
    .term-border { stroke: #313244; }
    .text-base { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Menlo, Consolas, monospace; font-size: 13px; }
    .text-dim { fill: #6c7086; }
    .text-normal { fill: #cdd6f4; }
    .text-green { fill: #a6e3a1; }
    .text-blue { fill: #89b4fa; }
    .text-yellow { fill: #f9e2af; }
    .text-teal { fill: #94e2d5; }
    .text-bold { font-weight: 600; }
    .text-title { fill: #bac2de; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 12px; }
    .dot-red { fill: #f38ba8; }
    .dot-yellow { fill: #f9e2af; }
    .dot-green { fill: #a6e3a1; }
    .cursor { fill: #cdd6f4; animation: blink 1.2s infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .cursor { animation: none; opacity: 1; } }
  </style>

  <rect class="term-bg" width="820" height="424" rx="10"/>
  <rect class="term-border" width="820" height="424" rx="10" stroke-width="1" fill="none"/>

  <rect class="term-titlebar" x="1" y="1" width="818" height="36" rx="10"/>
  <rect class="term-titlebar" x="1" y="27" width="818" height="10"/>
  <line x1="1" y1="37" x2="819" y2="37" class="term-border" stroke-width="1"/>
  <circle cx="22" cy="19" r="6" class="dot-red"/>
  <circle cx="42" cy="19" r="6" class="dot-yellow"/>
  <circle cx="62" cy="19" r="6" class="dot-green"/>
  <text class="text-title" x="410" y="23" text-anchor="middle">your-project — vidux</text>

  <g class="text-base" transform="translate(26, 68)">
    <text y="0">
      <tspan class="text-green">$</tspan>
      <tspan class="text-normal"> vidux init --here</tspan>
    </text>
    <text y="20" class="text-dim">created /path/to/your-project/PLAN.md</text>

    <text y="56">
      <tspan class="text-green">$</tspan>
      <tspan class="text-normal"> vidux status --root .</tspan>
    </text>
    <text y="76">
      <tspan class="text-normal">🎯 Tied to this chat</tspan>
      <tspan class="text-dim">  (your-project)</tspan>
    </text>
    <text y="94" class="text-dim">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    <text y="112" x="16" class="text-dim">(no active plans in focus)</text>
    <text y="140">
      <tspan class="text-normal">📋 Other tracked plans</tspan>
      <tspan class="text-dim">  (1 active)</tspan>
    </text>
    <text y="158" class="text-dim">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    <text y="176">
      <tspan class="text-yellow" x="16">PLAN.md</tspan>
      <tspan class="text-dim">                ░░░░░░░░░░   0%  ·  0.5 AI-hrs left  ·  today  [1p]</tspan>
    </text>

    <text y="212">
      <tspan class="text-green">$</tspan>
      <tspan class="text-normal"> vidux browse --root .</tspan>
    </text>
    <text y="232">
      <tspan class="text-normal">vidux browser → </tspan>
      <tspan class="text-blue">http://127.0.0.1:7191</tspan>
      <tspan class="text-dim">  (pid 6704, log $TMPDIR/vidux-browser.log)</tspan>
    </text>

    <text y="268">
      <tspan class="text-green">$</tspan>
      <tspan class="text-normal"> </tspan>
      <tspan class="cursor">▌</tspan>
    </text>
  </g>

  <text class="text-base" x="26" y="384">
    <tspan class="text-teal text-bold">Three commands.</tspan>
    <tspan class="text-dim"> A plan file, a status view, a local cockpit. No service, no account.</tspan>
  </text>
</svg>
