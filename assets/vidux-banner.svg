<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" fill="none">
  <style>
    :root {
      --bg: #ffffff;
      --bg-subtle: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-dim: #dbeafe;
      --node-bg: #ffffff;
      --node-border: #e2e8f0;
      --arrow: #cbd5e1;
      --line-accent: #3b82f6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --bg-subtle: #1e293b;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --accent: #60a5fa;
        --accent-dim: #1e3a5f;
        --node-bg: #1e293b;
        --node-border: #334155;
        --arrow: #475569;
        --line-accent: #60a5fa;
      }
    }
    .bg { fill: var(--bg); }
    .bg-subtle { fill: var(--bg-subtle); }
    .text-primary { fill: var(--text-primary); }
    .text-secondary { fill: var(--text-secondary); }
    .text-muted { fill: var(--text-muted); }
    .accent { fill: var(--accent); }
    .accent-dim { fill: var(--accent-dim); }
    .node-bg { fill: var(--node-bg); }
    .node-border { stroke: var(--node-border); fill: none; }
    .arrow { stroke: var(--arrow); fill: none; }
    .line-accent { stroke: var(--line-accent); fill: none; }
    .accent-stroke { stroke: var(--accent); fill: none; }

    /* Animations */
    @keyframes flow {
      0% { stroke-dashoffset: 24; }
      100% { stroke-dashoffset: 0; }
    }
    .flow-line {
      stroke-dasharray: 6 6;
      animation: flow 1.5s linear infinite;
    }
    @keyframes pulse-node {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .pulse { animation: pulse-node 3s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="960" height="320" rx="12" class="bg"/>

  <!-- Subtle grid dots -->
  <g class="text-muted" opacity="0.25">
    <circle cx="40" cy="40" r="1"/><circle cx="80" cy="40" r="1"/><circle cx="120" cy="40" r="1"/><circle cx="160" cy="40" r="1"/><circle cx="200" cy="40" r="1"/>
    <circle cx="40" cy="80" r="1"/><circle cx="80" cy="80" r="1"/><circle cx="120" cy="80" r="1"/><circle cx="160" cy="80" r="1"/><circle cx="200" cy="80" r="1"/>
    <circle cx="760" cy="240" r="1"/><circle cx="800" cy="240" r="1"/><circle cx="840" cy="240" r="1"/><circle cx="880" cy="240" r="1"/><circle cx="920" cy="240" r="1"/>
    <circle cx="760" cy="280" r="1"/><circle cx="800" cy="280" r="1"/><circle cx="840" cy="280" r="1"/><circle cx="880" cy="280" r="1"/><circle cx="920" cy="280" r="1"/>
  </g>

  <!-- Title -->
  <text x="480" y="90" text-anchor="middle" class="text-primary" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" letter-spacing="-2">vidux</text>

  <!-- Tagline -->
  <text x="480" y="125" text-anchor="middle" class="text-secondary" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400">Plan first, code second.</text>

  <!-- Flow diagram: the canonical cycle — READ → ASSESS → ACT → VERIFY → CHECKPOINT -->
  <g transform="translate(0, 170)">
    <!-- Node 1: READ -->
    <g transform="translate(40, 0)">
      <rect x="0" y="0" width="140" height="56" rx="10" class="node-bg"/>
      <rect x="0" y="0" width="140" height="56" rx="10" class="node-border" stroke-width="1.5"/>
      <text x="70" y="25" text-anchor="middle" class="text-muted" font-family="system-ui, sans-serif" font-size="10" font-weight="500" letter-spacing="1">READ</text>
      <text x="70" y="43" text-anchor="middle" class="text-primary" font-family="ui-monospace, monospace" font-size="13" font-weight="600">plan · proof</text>
    </g>

    <!-- Arrow 1→2 -->
    <line x1="186" y1="28" x2="213" y2="28" class="arrow flow-line" stroke-width="1.5"/>
    <polygon points="212,23 222,28 212,33" class="arrow" style="fill: var(--arrow);"/>

    <!-- Node 2: ASSESS -->
    <g transform="translate(225, 0)">
      <rect x="0" y="0" width="140" height="56" rx="10" class="node-bg"/>
      <rect x="0" y="0" width="140" height="56" rx="10" class="node-border" stroke-width="1.5"/>
      <text x="70" y="25" text-anchor="middle" class="text-muted" font-family="system-ui, sans-serif" font-size="10" font-weight="500" letter-spacing="1">ASSESS</text>
      <text x="70" y="43" text-anchor="middle" class="text-primary" font-family="ui-monospace, monospace" font-size="13" font-weight="600">what's next</text>
    </g>

    <!-- Arrow 2→3 -->
    <line x1="371" y1="28" x2="398" y2="28" class="arrow flow-line" stroke-width="1.5"/>
    <polygon points="397,23 407,28 397,33" class="arrow" style="fill: var(--arrow);"/>

    <!-- Node 3: ACT -->
    <g transform="translate(410, 0)">
      <rect x="0" y="0" width="140" height="56" rx="10" class="node-bg"/>
      <rect x="0" y="0" width="140" height="56" rx="10" class="node-border" stroke-width="1.5"/>
      <text x="70" y="25" text-anchor="middle" class="text-muted" font-family="system-ui, sans-serif" font-size="10" font-weight="500" letter-spacing="1">ACT</text>
      <text x="70" y="43" text-anchor="middle" class="text-primary" font-family="ui-monospace, monospace" font-size="13" font-weight="600">smallest slice</text>
    </g>

    <!-- Arrow 3→4 -->
    <line x1="556" y1="28" x2="583" y2="28" class="arrow flow-line" stroke-width="1.5"/>
    <polygon points="582,23 592,28 582,33" class="arrow" style="fill: var(--arrow);"/>

    <!-- Node 4: VERIFY -->
    <g transform="translate(595, 0)">
      <rect x="0" y="0" width="140" height="56" rx="10" class="node-bg"/>
      <rect x="0" y="0" width="140" height="56" rx="10" class="node-border" stroke-width="1.5"/>
      <text x="70" y="25" text-anchor="middle" class="text-muted" font-family="system-ui, sans-serif" font-size="10" font-weight="500" letter-spacing="1">VERIFY</text>
      <text x="70" y="43" text-anchor="middle" class="text-primary" font-family="ui-monospace, monospace" font-size="13" font-weight="600">real proof</text>
    </g>

    <!-- Arrow 4→5 -->
    <line x1="741" y1="28" x2="768" y2="28" class="line-accent flow-line" stroke-width="1.5"/>
    <polygon points="767,23 777,28 767,33" class="accent" style="fill: var(--accent);"/>

    <!-- Node 5: CHECKPOINT (the recovery packet — the reason vidux exists) -->
    <g transform="translate(780, 0)">
      <rect x="0" y="0" width="140" height="56" rx="10" class="accent-dim"/>
      <rect x="0" y="0" width="140" height="56" rx="10" class="accent-stroke" stroke-width="1.5"/>
      <text x="70" y="25" text-anchor="middle" class="text-muted" font-family="system-ui, sans-serif" font-size="10" font-weight="500" letter-spacing="1">CHECKPOINT</text>
      <text x="70" y="43" text-anchor="middle" class="accent" font-family="ui-monospace, monospace" font-size="13" font-weight="700">resume point</text>
    </g>

    <!-- Return arrow (bottom) -->
    <path d="M 920 40 Q 940 40 940 60 L 940 80 Q 940 95 920 95 L 545 95 M 375 95 L 60 95 Q 40 95 40 80 L 40 62" class="line-accent flow-line pulse" stroke-width="1.2" opacity="0.5"/>
    <polygon points="35,65 40,55 45,65" class="accent" style="fill: var(--accent);" opacity="0.5"/>
    <text x="460" y="99" text-anchor="middle" class="text-muted" font-family="system-ui, sans-serif" font-size="10" font-style="italic">the next run starts at READ</text>
  </g>

  <!-- Bottom tagline -->
  <text x="480" y="305" text-anchor="middle" class="text-muted" font-family="system-ui, -apple-system, sans-serif" font-size="12">Plan, proof, and resume that persist across sessions, agents, and days</text>
</svg>
