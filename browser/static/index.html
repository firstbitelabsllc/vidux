<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>Vidux</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    // FOUC guard: apply persisted theme before first paint. Without this,
    // the page renders with OS theme briefly, then flips to the stored
    // override when app.js runs (defer = post-parse). Inline + synchronous
    // = no flash. Mirrors getStoredTheme/resolveTheme logic in app.js;
    // any change there must update this block too.
    (function () {
      try {
        var stored = localStorage.getItem('vidux:theme') || 'system';
        var resolved = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.classList.toggle('theme-dark', resolved === 'dark');
        document.documentElement.classList.toggle('theme-light', resolved === 'light');
        // Stash the resolved theme so app.js can paint the toggle button
        // icon on its first run without re-deriving. The button itself has
        // empty textContent in HTML so it stays blank until app.js fills it
        // (avoids briefly showing the wrong icon).
        window.__viduxInitialTheme = resolved;
      } catch (e) { /* localStorage disabled — fall back to @media */ }
      try {
        // Same FOUC guard, for Simple/Advanced mode: apply the class to
        // <html> before first paint (document.body doesn't exist yet this
        // early in <head> -- documentElement does, same reason the theme
        // guard above uses it).
        if (localStorage.getItem('vidux:advancedMode') === '1') {
          document.documentElement.classList.add('advanced-mode');
        }
      } catch (e) { /* localStorage disabled -- defaults to Simple, which is safe */ }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" async></script>
  <script src="/static/vendor/dompurify.min.js" defer></script>
  <script src="/static/sidebar-sort.js" defer></script>
  <script src="/static/sidebar-filters.js" defer></script>
  <script src="/static/onboarding.js" defer></script>
  <script src="/static/work-queue.js" defer></script>
  <script src="/static/annotation-state.js" defer></script>
  <script src="/static/comment-rail.js" defer></script>
  <script src="/static/comment-markers.js" defer></script>
  <script src="/static/coordination-panel.js" defer></script>
  <script src="/static/steering-inbox.js" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body>
  <a href="#pane" class="skip-link">Skip to content</a>
  <header class="topbar" data-vidux-zone="status-header">
    <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Open projects" aria-controls="sidebar" aria-expanded="false">☰</button>
    <h1>Vidux</h1>
    <div class="topbar-meta">
      <span id="meta-count">…</span>
      <button id="mode-toggle" type="button" aria-pressed="false">Advanced</button>
      <button id="theme-toggle" type="button" title="Toggle light/dark theme" aria-label="Toggle light or dark theme"></button>
      <button id="refresh" type="button" title="Refresh plans" aria-label="Refresh plans"><span aria-hidden="true">↻</span><span class="refresh-label">Refresh</span></button>
    </div>
    <span id="refresh-status" class="visually-hidden" role="status" aria-live="polite"></span>
  </header>

  <main class="layout" data-vidux-zone="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Projects" data-vidux-zone="navigation-sidebar">
      <div class="sidebar-mobile-tools" aria-label="View settings">
        <span id="sidebar-meta-count">…</span>
        <button id="sidebar-mode-toggle" type="button" aria-pressed="false">Advanced</button>
        <button id="sidebar-theme-toggle" type="button">Theme</button>
        <button id="sidebar-refresh" type="button"><span aria-hidden="true">↻</span> Refresh</button>
      </div>
      <div class="sidebar-search sidebar-controls">
        <label for="filter" class="visually-hidden">Filter plans</label>
        <input id="filter" type="search" placeholder="Search projects and plans" aria-label="Search projects and plans" />
        <label for="sort" class="visually-hidden">Sort plans</label>
        <select id="sort" class="advanced-only" aria-label="Sort plans">
          <option value="mtime">Recently updated</option>
          <option value="eta">ETA</option>
          <option value="status">Status</option>
        </select>
        <div class="sidebar-filter-chips advanced-only" role="group" aria-label="Quick filters">
          <button type="button" class="filter-chip" data-filter-chip="hot" aria-pressed="false">hot</button>
          <button type="button" class="filter-chip" data-filter-chip="tasks" aria-pressed="false">tasks</button>
          <button type="button" class="filter-chip" data-filter-chip="eta" aria-pressed="false">ETA</button>
        </div>
      </div>
      <nav class="sidebar-list" id="sidebar-list" aria-label="Projects and plans">
        <p class="muted">loading…</p>
      </nav>
    </aside>

    <section class="pane" id="pane" tabindex="-1" data-vidux-zone="content-pane">
      <div class="pane-empty muted">
        <p>Loading plans…</p>
      </div>
    </section>
  </main>
</body>
</html>
